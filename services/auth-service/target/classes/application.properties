spring.application.name=auth-service
server.port=8081

# 1. State-of-the-Art Performance: Enable Virtual Threads (Project Loom)
spring.threads.virtual.enabled=true

# 2. Database Connection (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/auth_db
spring.datasource.username=admin
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Hibernate JPA Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. Custom JWT Properties (Secret must be at least 256 bits / 32 characters)
jwt.secret=secret-key-must-be-very-long-and-secure-for-hmac-256-encryption-algorithms
jwt.expiration=86400000
