spring.application.name=auth-service
server.port=8081

# 1. State-of-the-Art Performance: Enable Virtual Threads (Project Loom)
spring.threads.virtual.enabled=true

# 2. Database Connection (PostgreSQL)
spring.datasource.url=${AUTH_DATASOURCE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari CP settings for Serverless Databases (Neon)
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:600000}
spring.datasource.hikari.keepalive-time=${SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME:30000}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}

# 3. Hibernate JPA Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 4. Custom JWT Properties (Secret must be at least 256 bits / 32 characters)
jwt.secret=${JWT_SECRET:secret-key-must-be-very-long-and-secure-for-hmac-256-encryption-algorithms}
jwt.expiration=${JWT_EXPIRATION:86400000}
