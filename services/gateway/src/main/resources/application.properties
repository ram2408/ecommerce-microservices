spring.application.name=gateway
server.port=8080

# State-of-the-Art Concurrency with Virtual Threads
spring.threads.virtual.enabled=true

# Spring Cloud Gateway Route Configurations
# 1. Auth Service Route
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URI:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# 2. Catalog Service Route
spring.cloud.gateway.routes[1].id=catalog-service
spring.cloud.gateway.routes[1].uri=${CATALOG_SERVICE_URI:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**

# 3. Cart Service Route
spring.cloud.gateway.routes[2].id=cart-service
spring.cloud.gateway.routes[2].uri=${CART_SERVICE_URI:http://localhost:8083}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/cart/**

# 4. Order Service Route
spring.cloud.gateway.routes[3].id=order-service
spring.cloud.gateway.routes[3].uri=${ORDER_SERVICE_URI:http://localhost:8084}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/orders/**

# 5. Payment Service Route
spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=${PAYMENT_SERVICE_URI:http://localhost:8085}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/payments/**

# 6. Inventory Service Route
spring.cloud.gateway.routes[5].id=inventory-service
spring.cloud.gateway.routes[5].uri=${INVENTORY_SERVICE_URI:http://localhost:8086}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/inventory/**

# Global CORS Configuration for Frontend Access (Port 3000 / Production URL)
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
