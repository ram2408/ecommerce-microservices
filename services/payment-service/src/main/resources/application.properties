spring.application.name=payment-service
server.port=8085

# State-of-the-Art Concurrency with Virtual Threads
spring.threads.virtual.enabled=true

# 1. Database Connection (PostgreSQL - payment_db)
spring.datasource.url=${PAYMENT_DATASOURCE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payment_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari CP settings for Serverless Databases (Neon)
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:600000}
spring.datasource.hikari.keepalive-time=${SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME:30000}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 2. RabbitMQ Configuration
spring.rabbitmq.addresses=${SPRING_RABBITMQ_ADDRESSES:amqp://guest:guest@localhost:5672}

# 3. Spring Cloud Stream bindings
# Register the functional consumer bean 'orderConsumer'
spring.cloud.function.definition=orderConsumer

# Config for incoming Order events
spring.cloud.stream.bindings.orderConsumer-in-0.destination=order-events
spring.cloud.stream.bindings.orderConsumer-in-0.group=payment-group
spring.cloud.stream.bindings.orderConsumer-in-0.contentType=application/json

# Config for outgoing Payment events (published via StreamBridge)
spring.cloud.stream.bindings.paymentSource-out-0.destination=payment-events
spring.cloud.stream.bindings.paymentSource-out-0.contentType=application/json
